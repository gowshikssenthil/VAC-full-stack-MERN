<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doccument</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows:80px 80px 80px 80px;
            gap: 10px;
        }
        .header{
            grid-column-start: 1;
            grid-column-end: 3;
            background-color: rgb(0, 184, 245);
        }
        .sidebar{
            background-color: rgb(223, 255, 79);
        }
        .content{
            background-color: rgb(126, 126, 2);
        }
        .footer{
            background-color: rgb(5, 168, 5);
        }
        </style>
   </head>
    <body>
        <div class="container">
            <header class="header"></header>
            <aside class="sidebar"></aside>
            <main class="content"></main>
            <footer class="footer"></footer>
        </div>
    </body>
</html>
