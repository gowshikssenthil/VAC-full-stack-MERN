<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        .box{
            width: 100px;
             height: 50px;
             border :2px solid black;
             margin: 20px;
                background-color: #44d0e9;
        }
        .container{
            display: grid;
            grid-template-columns: 100px 100px 100px;
            grid-template-rows: 100px 100px 100px;
            gap: 100px;
        }
    </style>
</head>
<body>
    <div class="box">bsc</div>
    <div class="box">b.com</div>
    <div class="box">b.tech</div> 
    <div class="box">bca</div>
    <div class="box">bba</div>     
    <div class="box">m.sc</div>
    <div class="box">m.com</div>
    <div class="box">mba</div>
    </body>
    </html>
